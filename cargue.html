<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Cargue masivo — Naowee Organismos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=1.2.1">
<link rel="stylesheet" href="shared/shell.css?v=1.2.1">
<link rel="stylesheet" href="shared/components.css?v=1.2.1">
<link rel="stylesheet" href="shared/forms.css?v=1.2.1">
<link rel="stylesheet" href="shared/naowee-footer.css?v=1.2.1">

<!-- SheetJS (solo en esta pantalla, para plantilla .xlsx + parseo) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page">
      <div class="page-inner">
        <div class="page-head">
          <h1 class="page-head__title">Cargue masivo</h1>
          <p class="page-head__sub">Pre-registro de los organismos de nivel inferior por plantilla: cada nivel carga masivamente a los que dependen de él. Las filas válidas quedan Preinscrito y aparecen en la jerarquía.</p>
        </div>
        <div id="cargueRoot"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { getRoleFromQuery, ROLES, mountSidebar, mountHeader, mountBackdrop, mountDemoSwitcher } from './shared/sidebar.js';
  import { seedDemoData } from './shared/organismos-data.js';
  seedDemoData();
  const roleCode = getRoleFromQuery();
  const role = ROLES[roleCode];
  mountSidebar({ rootEl: document.getElementById('sidebarRoot'), roleCode, activeId: 'cargue' });
  mountHeader({ headerEl: document.getElementById('topHeader'), role });
  mountBackdrop();
  mountDemoSwitcher({ roleCode });
  /* El módulo se auto-arranca al importar (render por rol). */
  import('./shared/cargue.js?v=1.2.1');
</script>
<script src="shared/naowee-footer.js?v=1.2.1"></script>
<script src="shared/tour.js?v=1.2.1"></script>

</body>
</html>
