<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mi afiliación — Naowee Organismos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="shared/tokens.css?v=0.7.0">
<link rel="stylesheet" href="shared/shell.css?v=0.7.0">
<link rel="stylesheet" href="shared/components.css?v=0.7.0">
<link rel="stylesheet" href="shared/forms.css?v=0.7.0">
<link rel="stylesheet" href="shared/naowee-footer.css?v=0.7.0">
</head>
<body>

<div class="shell">
  <div id="sidebarRoot"></div>
  <div class="main">
    <header class="top-header" id="topHeader"></header>
    <div class="page">
      <div class="page-inner">
        <div class="page-head">
          <h1 class="page-head__title">Mi afiliación</h1>
          <p class="page-head__sub">Solicita tu afiliación a un club deportivo. Al aprobarla el club, heredas automáticamente la liga y la federación correspondientes (ORG-05).</p>
        </div>
        <div id="afilRoot"></div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { getRoleFromQuery, ROLES, mountSidebar, mountHeader, mountBackdrop, mountDemoSwitcher } from './shared/sidebar.js';
  import { seedDemoData } from './shared/organismos-data.js';
  seedDemoData();
  const roleCode = getRoleFromQuery();
  const role = ROLES[roleCode];
  mountSidebar({ rootEl: document.getElementById('sidebarRoot'), roleCode, activeId: 'afiliacion' });
  mountHeader({ headerEl: document.getElementById('topHeader'), role });
  mountBackdrop();
  mountDemoSwitcher({ roleCode });
  /* El módulo se auto-arranca al importar (render por estado del deportista). */
  import('./shared/afiliacion.js?v=0.7.0');
</script>
<script src="shared/naowee-footer.js?v=0.7.0"></script>

</body>
</html>
